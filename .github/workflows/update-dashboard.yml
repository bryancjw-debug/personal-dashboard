name: Update dashboard data

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh dashboard snapshot
        run: node scripts/update-data.js

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh dashboard data"
          file_pattern: data/dashboard.json

      - name: Publish refreshed site
        run: git push origin HEAD:gh-pages --force
