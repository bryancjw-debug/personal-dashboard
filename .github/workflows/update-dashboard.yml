name: Update dashboard data

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "10 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh dashboard snapshot
        run: node scripts/update-data.js

      - name: Commit refreshed data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
          else
            git commit -m "Refresh dashboard data"
            git push origin HEAD:main
          fi

      - name: Publish refreshed site
        run: git push origin HEAD:gh-pages --force
